# Conga Line Egress Proxy
# Only allows HTTPS (443) and DNS (53) traffic.
# Agent containers use this as their DNS server and HTTPS gateway.

events {
    worker_connections 256;
}

stream {
    # Map SNI hostname to upstream (must be before server blocks)
    map $ssl_preread_server_name $upstream {
        default $ssl_preread_server_name:443;
    }

    # HTTPS passthrough (port 443) via SNI
    server {
        listen 3128;
        proxy_pass $upstream;
        ssl_preread on;
        resolver 8.8.8.8 valid=300s;
        resolver_timeout 5s;
    }

    # DNS forwarding (UDP)
    server {
        listen 53 udp;
        proxy_pass 8.8.8.8:53;
        proxy_timeout 5s;
    }

    # DNS forwarding (TCP)
    server {
        listen 53;
        proxy_pass 8.8.8.8:53;
        proxy_timeout 5s;
    }
}
