version: 2
project_name: conga

builds:
  - main: .
    binary: conga
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/cruxdigital-llc/conga-line/cli/cmd.Version={{.Version}}
      - -X github.com/cruxdigital-llc/conga-line/cli/cmd.Commit={{.Commit}}
      - -X github.com/cruxdigital-llc/conga-line/cli/cmd.Date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "conga_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

brews:
  - repository:
      owner: cruxdigital-llc
      name: homebrew-conga-line
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    name: conga
    homepage: https://github.com/cruxdigital-llc/conga-line
    description: Conga Line — manage your OpenClaw deployment
    license: Apache-2.0
    install: |
      bin.install "conga"
    test: |
      system "#{bin}/conga", "version"

release:
  github:
    owner: cruxdigital-llc
    name: conga-line
