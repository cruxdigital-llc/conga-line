version: 2
project_name: conga

builds:
  - main: .
    binary: conga
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/cruxdigital-llc/conga-line/cli/cmd.Version={{.Version}}
      - -X github.com/cruxdigital-llc/conga-line/cli/cmd.Commit={{.Commit}}
      - -X github.com/cruxdigital-llc/conga-line/cli/cmd.Date={{.Date}}

archives:
  - format: tar.gz
    name_template: "conga_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

release:
  github:
    owner: cruxdigital-llc
    name: conga-line
